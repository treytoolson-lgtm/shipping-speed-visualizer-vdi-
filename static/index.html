<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Speed Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Walmart colors */
            --blue-100: #0053e2;
            --blue-110: #0040b8;
            --blue-130: #002080;
            --spark-100: #ffc220;
            --spark-140: #995213;
            --spark-10: #fff5e6;
            --green-100: #2a8703;
            --red-100: #ea1100;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-400: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2942 100%);
            color: var(--gray-100);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid var(--dark-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue-100) 0%, var(--blue-110) 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 83, 226, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 83, 226, 0.4);
        }

        .btn-primary:active {
            background: linear-gradient(135deg, var(--blue-130) 0%, var(--blue-110) 100%);
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
            transform: none;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 1rem;
            color: var(--gray-100);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--blue-100);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 83, 226, 0.1);
        }

        .input-field::placeholder {
            color: var(--gray-400);
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--dark-border);
            border-radius: 0.75rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--blue-100);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(234, 17, 0, 0.15);
            border: 1px solid var(--red-100);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
        }

        .error.show {
            display: block;
        }

        .legend {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-100);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 0.25rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 83, 226, 0.1) 0%, rgba(0, 83, 226, 0.05) 100%);
            padding: 1.25rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--blue-100);
            border: 1px solid var(--dark-border);
            border-left: 4px solid var(--blue-100);
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue-100) 0%, var(--spark-100) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0 0;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h1 {
            background: linear-gradient(135deg, var(--blue-100) 0%, var(--spark-100) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        h2 {
            color: var(--gray-100);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <!-- Header -->
        <header class="relative overflow-hidden py-8 sm:py-12">
            <div class="absolute inset-0 bg-gradient-to-r from-blue-900/20 via-transparent to-blue-900/20"></div>
            <div class="relative max-w-6xl mx-auto px-4">
                <div class="flex items-center gap-4 mb-3">
                    <span class="text-5xl">📦</span>
                    <h1 class="text-4xl sm:text-5xl font-bold">Shipping Speed Visualizer</h1>
                </div>
                <p class="text-blue-200 text-lg">Compare WFS vs SFF shipping performance by seller</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- Input Section -->
            <div class="card mb-6">
                <h2 style="margin-top: 0;">Enter Seller Details</h2>
                <div id="errorMsg" class="error"></div>
                <div class="flex flex-col sm:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label for="pid" class="block text-sm font-medium mb-2">Seller PID</label>
                        <input
                            type="text"
                            id="pid"
                            class="input-field w-full"
                            placeholder="Enter PID (e.g., 10000002874)"
                            required
                        />
                    </div>
                    <div class="w-full sm:w-32">
                        <label for="days_back" class="block text-sm font-medium mb-2">Days Back</label>
                        <input
                            type="number"
                            id="days_back"
                            class="input-field w-full"
                            value="90"
                            min="7"
                            max="365"
                        />
                    </div>
                    <button id="analyzeBtn" class="btn-primary w-full sm:w-auto" onclick="analyzeShippingSpeed()">
                        Analyze
                    </button>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p class="text-gray-400">Fetching shipping data from BigQuery...</p>
            </div>

            <!-- Results Section -->
            <div id="results"></div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-dark-border bg-gradient-to-r from-blue-900/10 to-blue-900/10 py-6 mt-12">
            <div class="max-w-6xl mx-auto px-4 text-center text-sm text-gray-400">
                <p>Shipping Speed Visualizer • Powered by Code Puppy 📦</p>
            </div>
        </footer>
    </div>

    <script>
        let chartInstance = null;

        async function analyzeShippingSpeed() {
            const pid = document.getElementById('pid').value.trim();
            const daysBack = parseInt(document.getElementById('days_back').value);
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const analyzeBtn = document.getElementById('analyzeBtn');

            // Validation
            if (!pid) {
                errorMsg.textContent = 'Please enter a PID';
                errorMsg.classList.add('show');
                return;
            }

            // Reset UI
            errorMsg.classList.remove('show');
            results.innerHTML = '';
            loading.classList.add('show');
            analyzeBtn.disabled = true;

            try {
                const response = await fetch('/api/shipping-speed', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        pid: pid,
                        days_back: daysBack
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to fetch data');
                }

                loading.classList.remove('show');
                displayResults(data);

            } catch (error) {
                loading.classList.remove('show');
                errorMsg.textContent = `Error: ${error.message}`;
                errorMsg.classList.add('show');
            } finally {
                analyzeBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const results = document.getElementById('results');
            const labels = ['2-day', '3-day', '4-day', '5-day', '6-day', '7-day', '8-day', '9-day', '10-day'];

            const wfsValues = labels.map(label => data.wfs_data[label] || 0);
            const sffValues = labels.map(label => data.sff_data[label] || 0);

            // Calculate percentages
            const totalWfs = data.total_wfs_orders;
            const totalSff = data.total_sff_orders;

            // Stats HTML
            const statsHTML = `
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">WFS Orders</div>
                        <div class="stat-value">${totalWfs.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">SFF Orders</div>
                        <div class="stat-value">${totalSff.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value">${(totalWfs + totalSff).toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Period</div>
                        <div class="stat-value" style="font-size: 1rem; background: none; color: var(--blue-100);">${data.analysis_period}</div>
                    </div>
                </div>
            `;

            results.innerHTML = `
                <div class="card">
                    <h2>Results for PID: ${data.pid}</h2>
                    ${statsHTML}
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background-color: #0053e2;"></div>
                            <span>WFS (Walmart Fulfilled)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background-color: #ffc220;"></div>
                            <span>SFF (Seller Fulfilled)</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="shippingChart"></canvas>
                    </div>
                </div>
            `;

            // Initialize chart
            setTimeout(() => {
                const ctx = document.getElementById('shippingChart');
                if (chartInstance) {
                    chartInstance.destroy();
                }
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'WFS (Walmart Fulfilled)',
                                data: wfsValues,
                                backgroundColor: 'rgba(0, 83, 226, 0.8)',
                                borderColor: '#0053e2',
                                borderWidth: 2,
                                borderRadius: 6,
                                hoverBackgroundColor: 'rgba(0, 83, 226, 1)',
                            },
                            {
                                label: 'SFF (Seller Fulfilled)',
                                data: sffValues,
                                backgroundColor: 'rgba(255, 194, 32, 0.8)',
                                borderColor: '#ffc220',
                                borderWidth: 2,
                                borderRadius: 6,
                                hoverBackgroundColor: 'rgba(255, 194, 32, 1)',
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    font: { size: 13, weight: 'bold' },
                                    padding: 15,
                                    boxWidth: 12,
                                    boxHeight: 12,
                                    color: '#f1f5f9'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Order Count by Shipping Speed (Days)',
                                font: { size: 15, weight: 'bold' },
                                padding: 15,
                                color: '#f1f5f9'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: 'Number of Orders',
                                    font: { weight: 'bold' },
                                    color: '#f1f5f9'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#cbd5e1'
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: 'Delivery Speed (Days)',
                                    font: { weight: 'bold' },
                                    color: '#f1f5f9'
                                },
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    color: '#cbd5e1'
                                }
                            }
                        }
                    }
                });
            }, 0);
        }

        // Allow Enter key to submit
        document.getElementById('pid').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeShippingSpeed();
            }
        });
    </script>
</body>
</html>
