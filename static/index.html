<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Speed Visualizer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='%23ffc220' transform='translate(50,50)'><rect x='-4' y='-45' width='8' height='38' rx='4'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(60)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(120)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(180)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(240)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(300)'/></g><text x='50' y='62' font-family='sans-serif' font-weight='900' font-size='38' text-anchor='middle' fill='%230053e2' stroke='white' stroke-width='4' paint-order='stroke'>WFS</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'wmt-blue': '#0053e2',       // blue.100 (Primary Brand)
                        'wmt-blue-light': '#6fa8f8', // blue ~50 (WFS Non-Sort)
                        'wmt-spark': '#ffc220',      // spark.100 (Secondary Brand)
                        'wmt-spark-light': '#ffd966',// spark ~50 (SFF Non-Sort)
                        'wmt-red': '#ea1100',        // red.100 (Error)
                        'wmt-green': '#2a8703',      // green.100 (Success)
                        'wmt-black': '#000000',
                        'wmt-gray-160': '#2e2f32',   // Text
                        'wmt-gray-50': '#e3e4e5',    // Border
                        'wmt-gray-10': '#f2f2f2',    // Subtle BG
                    },
                    fontFamily: {
                        sans: ['Myriad Pro', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.15);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid rgb(59, 130, 246);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chart-container {
            position: relative;
            height: 250px;
            padding: 0.5rem;
        }

        /* Spark Animation */
        @keyframes spark-breathe {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.6); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .animate-spin-spark {
            animation: spark-breathe 3s ease-in-out infinite;
            transform-origin: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-wmt-gray-160 font-sans">
    <!-- Header -->
    <header class="bg-wmt-blue shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg class="h-12 w-12" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                        <g fill="#ffc220" transform="translate(50,50)">
                            <rect x="-4" y="-45" width="8" height="38" rx="4"/>
                            <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(60)"/>
                            <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(120)"/>
                            <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(180)"/>
                            <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(240)"/>
                            <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(300)"/>
                        </g>
                        <text x="50" y="62" font-family="sans-serif" font-weight="900" font-size="38" text-anchor="middle" fill="#0053e2" stroke="white" stroke-width="4" paint-order="stroke">WFS</text>
                    </svg>
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight">Shipping Speed Visualizer</h1>
                        <p class="text-white/90 text-sm font-medium">Compare WFS vs SFF shipping performance by seller</p>
                    </div>
                </div>
                <div class="text-white/90 text-sm font-medium">
                    Created by Trey Toolson
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Input Section -->
        <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 card-hover fade-in mb-8">
            <h2 class="text-xl font-bold mb-6 text-wmt-gray-160">Enter Seller Details</h2>
            <div id="errorMsg" class="bg-red-50 border border-wmt-red text-wmt-red px-4 py-3 rounded-md mb-4 hidden text-sm font-medium"></div>
            <div class="flex flex-col sm:flex-row gap-4 items-end">
                <div class="flex-1">
                    <label for="pid" class="block text-sm font-bold mb-2 text-wmt-gray-160">Seller PID</label>
                    <input
                        type="text"
                        id="pid"
                        class="w-full bg-white border border-gray-300 rounded-full px-5 py-2.5 text-wmt-gray-160 placeholder-gray-500 focus:outline-none focus:border-wmt-blue focus:ring-2 focus:ring-wmt-blue/20 transition-all font-medium"
                        placeholder="Enter PID (e.g., 10000002874)"
                        required
                    />
                </div>
                <div class="w-full sm:w-48">
                    <label for="time_period" class="block text-sm font-bold mb-2 text-wmt-gray-160">Time Period</label>
                    <select
                        id="time_period"
                        class="w-full bg-white border border-gray-300 rounded-full px-5 py-2.5 text-wmt-gray-160 focus:outline-none focus:border-wmt-blue focus:ring-2 focus:ring-wmt-blue/20 transition-all font-medium appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%230071DC%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4l128-128c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px_12px] bg-[right_1rem_center] bg-no-repeat pr-10"
                    >
                        <option value="365" selected>12 Months</option>
                        <option value="548">18 Months</option>
                        <option value="730">24 Months</option>
                    </select>
                </div>
                <button id="analyzeBtn" class="w-full sm:w-auto bg-wmt-blue hover:bg-[#004dc1] active:bg-[#003d99] text-white font-bold py-2.5 px-8 rounded-full shadow-sm transition-all duration-200 text-sm tracking-wide flex items-center justify-center gap-2" onclick="analyzeShippingSpeed()"> 
                    Analyze
                </button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden text-center py-8">
            <div class="mx-auto mb-4 flex justify-center">
                <svg class="animate-spin-spark h-12 w-12 text-wmt-spark" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <g>
                        <rect x="11" y="1" width="2" height="8" rx="1" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(60 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(120 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(180 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(240 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(300 12 12)" />
                    </g>
                </svg>
            </div>
            <p class="text-wmt-gray-160 font-medium">Fetching shipping data from BigQuery...</p>
        </div>

        <!-- Results Section -->
        <div id="results"></div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-300 bg-gray-100 py-6 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-600">
            <p>Shipping Speed Visualizer • Created by Trey Toolson</p>
        </div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
